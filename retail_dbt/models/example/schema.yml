version: 2

models:
  - name: stg_orders
    description: "Silver staging model built from raw.sales_transactions"
    columns:
      - name: transaction_id
        description: "Transaction identifier"
        tests:
          - not_null
          - unique
      - name: customer_id
        description: "Customer identifier"
        tests:
          - not_null
      - name: transaction_date
        description: "Transaction date/time"
        tests:
          - not_null
      - name: total_amount
        description: "Total transaction amount"
        tests:
          - not_null

  - name: silver_sales_valid
    description: "Clean sales orders that pass business rules (quantity > 0 and transaction_date <= today)"
    columns:
      - name: transaction_id
        description: "Source transaction id"
        tests:
          - not_null
          - unique
      - name: customer_id
        description: "Customer identifier"
        tests:
          - not_null
      - name: transaction_date
        description: "Date of the transaction"
        tests:
          - not_null
      - name: quantity
        description: "Purchased quantity"
        tests:
          - not_null
      - name: total_amount
        description: "Order amount"
        tests:
          - not_null

  - name: silver_sales_invalid
    description: "Sales orders failing business rules (quantity <= 0 or future transaction_date)"
    columns:
      - name: transaction_id
        description: "Source transaction id"
        tests:
          - not_null
          - unique
      - name: customer_id
        description: "Customer identifier"
        tests:
          - not_null
      - name: transaction_date
        description: "Date of the transaction"
        tests:
          - not_null
      - name: quantity
        description: "Purchased quantity"
        tests:
          - not_null
      - name: total_amount
        description: "Order amount"
        tests:
          - not_null
